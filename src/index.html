<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>connect4</title>
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="connect4 game">
    <link id="favicon" rel="icon" href="./images/icon.svg" sizes="any" type="image/svg+xml">
    <link rel="manifest" href="./app.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="./images/icon.png">
</head>
<body>
<div class="content">
    <div class="menu"></div>
    <section class="menu">
        <div id="control-panel" class="control-panel minimized">
            <div class="panel-header">
                <!--⛶ ⤭ ◱ 🗖 🗖 -->
                <button id="butInstall" title="install" class="hidden contrl-btn butInstall">↓</button>
                <button id="sound" title="sound" class="contrl-btn hidden js-sound-btn">&#128266;</button>
                <button class="js-help help-btn contrl-btn circled" title="Rules" popovertarget="rulesDialog"></button>
            </div>
            <div class="panel-content"></div>
        </div>
        <div class="video-barcode"></div>
    </section>
    <div class="app">
        <div class="buffer"></div>
        <div class="field"></div>
        <div class="reload hidden"><img src="./images/reload.svg" alt="reload"></div>
    </div>
    <div class="qrcontainer"></div>
    <div class="qrcontainerserver"></div>
    <div id="popup1" class="overlay">
        <div class="popup">
            <h2>You win</h2>
            <a class="close" href="#">&times;</a>
            <div class="content">
                Result 0
            </div>
        </div>
    </div>
</div>
<dialog popover id="rulesDialog" >
    <p class="rulesContent">
    </p>
</dialog>
<footer>
</footer>
<template id="result-row">
    <li class="row">
        <div class="request"></div>
        <div class="response"></div>
    </li>
</template>
</body>

</html>
