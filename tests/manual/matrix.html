<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matrix</title>
    <style>
        .matrix-grid {
            display: grid; /* Declares the element as a grid container */
            /* Creates 3 columns, each taking an equal fraction of the available space */
            grid-template-columns: repeat(3, 1fr);
            /* Creates 3 rows, each taking an equal fraction of the available space */
            grid-template-rows: repeat(3, 1fr);
            gap: 10px; /* Adds space between grid items */
            border: 1px solid black;
            padding: 10px;
            width: 300px; /* Example width */
        }

        .cell {
            background-color: lightgray;
            border: 1px solid #ccc;
            padding: 10px;
            aspect-ratio: 1/1;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="matrix-grid">
    <!-- Row 1 -->
    <div class="cell">1,1</div>
    <div class="cell">1,2</div>
    <div class="cell">1,3</div>
    <!-- Row 2 -->
    <div class="cell">2,1</div>
    <div class="cell">2,2</div>
    <div class="cell">2,3</div>
    <!-- Row 3 -->
    <div class="cell">3,1</div>
    <div class="cell">3,2</div>
    <div class="cell">3,3</div>
</div>

</body>
</html>
